/**:
  ros__parameters:
    # ----------------------------------------------------------------------------------------------------------
    # Low-level configurations
    # ----------------------------------------------------------------------------------------------------------
    dynamics:
      mass: 1.650 #Kg
      thrust_curve:
        # Formula T(N) = a * input^2 + b*input + c
        # with input = [0.0, 1.0], hence we need to scale by 100.0
        identifier: 'Quadratic'
        parameter_names: ["a", "b", "c", "scale"]
        parameters: [34.03, 7.151, -0.012, 100.0]
    # ----------------------------------------------------------------------------------------------------------
    # Autopilot configurations
    # ----------------------------------------------------------------------------------------------------------
    autopilot:
      # Update rate
      rate: 33.0 # Hz
      # ----------------------------------------------------------------------------------------------------------
      # Definition of the controller that will perform the tracking of references of the different operation modes
      # ----------------------------------------------------------------------------------------------------------
      controller: "MellingerController"
      # Configurations needed by the PX4 controller
      OnboardController:
        publishers:
          control_position: "fmu/in/position"
          control_body_velocity: "fmu/in/velocity/body"
          control_inertial_velocity: "fmu/in/velocity/inertial"
          control_inertial_acceleration: "fmu/in/inertial_acceleration"
          control_attitude: "fmu/in/force/attitude"
          control_attitude_rate: "fmu/in/force/attitude_rate"
      PIDController:
        publishers:
          control_attitude: "fmu/in/force/attitude"
          control_attitude_rate: "fmu/in/force/attitude_rate"
          pid_debug_topic: "autopilot/statistics/pid"
        # Gains for position PIDs on [x, y, z]
        gains:
          kp: [4.0, 4.0, 4.0]   # Proportional gain
          kd: [3.9, 3.9, 3.9]   # Derivative gain
          ki: [0.0, 0.0, 0.1]   # Integral gain
          min_output: [-20.0, -20.0, -20.0] # Minimum output of each PID
          max_output: [ 20.0,  20.0,  20.0]
      MellingerController:
        publishers:
          control_attitude: "fmu/in/force/attitude"
          control_attitude_rate: "fmu/in/force/attitude_rate"
          debug_topic: "autopilot/statistics/mellinger"
        gains:
          kp: [5.2, 5.2, 5.5]    # Proportional gain
          kd: [5.1, 5.1, 5.1]    # Derivative gain
          ki: [0.01, 0.01, 0.1]  # Integral gain
          kr: [5.5, 5.5, 5.5]    # Attitude error gain

          # kp: [7.5, 7.5, 8.5]    # Proportional gain
          # kd: [6.5, 6.5, 6.5]    # Derivative gain
          # ki: [0.01, 0.01, 0.1]  # Integral gain
          # kr: [6.5, 6.5, 6.5]    # Attitude error gain
          min_output: [-50.0, -50.0, -50.0]  # Minimum output of each PID
          max_output: [ 50.0,  50.0,  50.0]  # Maximum output of each PID
          max_pos_error: [3.0, 3.0, 5.0]     # Saturation for the max absolute error (in meters) in the x, y and z directions
      # ----------------------------------------------------------------------------------------------------------
      # Definition of the geofencing mechanism that will keep the vehicle in safe places
      # ----------------------------------------------------------------------------------------------------------
      geofencing: "BoxGeofencing"
      BoxGeofencing:
        limits_x: [-100.0, 100.0]
        limits_y: [-100.0, 100.0]
        limits_z: [-100.0,  1.00] # NED Coordinades (z-negative is up)
      # ----------------------------------------------------------------------------------------------------------
      # Definition of the trajectory manager that generates parameterized trajectories to be followed
      # ----------------------------------------------------------------------------------------------------------
      trajectory_manager: "StaticTrajectoryManager"
      StaticTrajectoryManager:
        trajectories: ["ArcFactory", "LineFactory", "CircleFactory", "LemniscateFactory", "CSVFactory"]
        services:
          reset_trajectory: "autopilot/trajectory/reset"
        # Individual trajectory setup
        ArcFactory:
          service: "autopilot/trajectory/add_arc"
        LineFactory:
          service: "autopilot/trajectory/add_line"
        CircleFactory:
          service: "autopilot/trajectory/add_circle"
        LemniscateFactory:
          service: "autopilot/trajectory/add_lemniscate"
        CSVFactory:
          service: "autopilot/trajectory/add_csv"
      # ---------------------------------------------------------------------------------------------------------
      # Define the default operation mode (the one which the autopilot initializes at)
      # ---------------------------------------------------------------------------------------------------------
      default_mode: "DisarmMode"
      # Define all the existing operation modes
      modes: ["DisarmMode", "ArmMode", "TakeoffMode", "OnboardLandMode", "LandMode", "HoldMode", "WaypointMode", "FollowTrajectoryMode", "PassThroughMode", "ManualMode", "SmoothWaypointMode"]
      # Configurations of each operating mode:
      # 1) Define the valid transitions from a given operation mode to other operation modes
      # 2) Fallback mode if something goes wrong
      # 3) Other specific operating mode configuration
      DisarmMode: 
        valid_transitions: ["ArmMode"]
        fallback: "DisarmMode"
        disarm_service: "fmu/kill_switch"
      ArmMode: 
        valid_transitions: ["DisarmMode", "TakeoffMode", "HoldMode", "WaypointMode", "FollowTrajectoryMode", "PassThroughMode", "ManualMode", "SmoothWaypointMode"]
        fallback: "DisarmMode"
        geofencing_violation_fallback: "DisarmMode"
        arm_service: "fmu/arm"
        offboard_service: "fmu/offboard"
      TakeoffMode: 
        valid_transitions: ["OnboardLandMode", "LandMode", "HoldMode", "WaypointMode", "FollowTrajectoryMode", "PassThroughMode", "ManualMode", "SmoothWaypointMode"]
        fallback: "HoldMode"
        on_finish: "HoldMode"
        geofencing_violation_fallback: "HoldMode"
        takeoff_altitude: -1.0 # m (NED)
        set_takeoff_altitude_service: "autopilot/set_takeoff"
      LandMode: 
        valid_transitions: ["DisarmMode", "ArmMode", "TakeoffMode", "HoldMode", "WaypointMode", "FollowTrajectoryMode", "PassThroughMode", "ManualMode", "SmoothWaypointMode"]
        fallback: "HoldMode"
        on_finish: "DisarmMode"
        land_speed: 0.5 # m/s
        land_detected_treshold: 0.1 # m/s
        countdown_to_disarm: 3.0 # s
      OnboardLandMode: 
        valid_transitions: ["DisarmMode", "ArmMode", "TakeoffMode", "HoldMode", "WaypointMode", "FollowTrajectoryMode", "PassThroughMode", "ManualMode", "SmoothWaypointMode"]
        fallback: "HoldMode"
        on_finish: "DisarmMode"
        land_service: "fmu/land"
      HoldMode: 
        valid_transitions: ["OnboardLandMode", "LandMode", "WaypointMode", "FollowTrajectoryMode", "PassThroughMode", "ManualMode", "SmoothWaypointMode"]
        fallback: "OnboardLandMode"
      WaypointMode: 
        valid_transitions: ["OnboardLandMode", "LandMode", "HoldMode", "FollowTrajectoryMode", "PassThroughMode", "ManualMode", "SmoothWaypointMode"]
        fallback: "HoldMode"
        geofencing_violation_fallback: "HoldMode"
        set_waypoint_service: "autopilot/set_waypoint"
      SmoothWaypointMode: 
        valid_transitions: ["OnboardLandMode", "LandMode", "HoldMode", "FollowTrajectoryMode", "PassThroughMode", "ManualMode"]
        fallback: "HoldMode"
        geofencing_violation_fallback: "HoldMode"
        set_waypoint_service: "autopilot/set_smooth_waypoint"
        max_speed: 2.5         # Max speed in m/s
        max_acceleration: 1.2  # Max acceleration in m/s^2
      FollowTrajectoryMode: 
        valid_transitions: ["OnboardLandMode", "LandMode", "HoldMode", "WaypointMode", "PassThroughMode", "ManualMode", "SmoothWaypointMode"]
        fallback: "HoldMode"
        geofencing_violation_fallback: "HoldMode"
        on_finish: "HoldMode"
      ManualMode:
        valid_transitions: ["LandMode", "HoldMode", "WaypointMode", "PassThroughMode", "FollowTrajectoryMode", "SmoothWaypointMode"]
        fallback: "HoldMode"
        on_finish: "HoldMode"
        subscribers:
          manual_command: "autopilot/manual"
      PassThroughMode: 
        valid_transitions: ["DisarmMode", "ArmMode", "TakeoffMode", "OnboardLandMode", "LandMode", "HoldMode", "WaypointMode", "FollowTrajectoryMode", "ManualMode", "SmoothWaypointMode"]
        fallback: "HoldMode"
        geofencing_violation_fallback: "HoldMode"
      # Topics configurations
      publishers:
        control_position: "fmu/in/position"
        control_attitude: "fmu/in/force/attitude"
        control_attitude_rate: "fmu/in/force/attitude_rate"
        status: "autopilot/status"
      subscribers:
        state: "fmu/filter/state"
        status: "fmu/status"
        constants: "fmu/constants"
      services:
        set_mode: "autopilot/change_mode"